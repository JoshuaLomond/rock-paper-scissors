<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Rock Paper Scissors</title>

        <!-- Link to external stylesheet -->
        <link rel="stylesheet" href="src/styles.css" />
        <!-- Link to external JavaScript file -->
        <script defer src="src/script.js"></script>
    </head>

    <body>
        <div id="root">
            <!-- Display Results -->
            <div id="result">
                <div id="result-text">Choose your weapon!</div>
            </div>

            <!-- User-Interface -->
            <div id="images">
                <div id="rock">
                    <img id="rock-img" src="img/rock.png" alt="Rock Image" />
                </div>
                <div id="paper">
                    <img id="paper-img" src="img/paper.png" alt="Paper Image" />
                </div>
                <div id="scissors">
                    <img id="scissors-img" src="img/scissors.png" alt="Scissors Image" />
                </div>
            </div>

            <!-- Display Scores -->
            <div id="scores">
                <div id="player-score">Player: 0</div>
                <div id="cpu-score">CPU: 0</div>
            </div>
        </div>
    </body>
</html>
